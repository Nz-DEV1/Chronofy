<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chronofy | Modern Countdown App</title>
    <meta name="description" content="Chronofy — A beautiful, multilingual countdown timer app. Track your most important moments.">
    <!-- Prevent FOUC -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        const _sl = localStorage.getItem('lang') || 'ar';
        document.documentElement.lang = _sl;
        document.documentElement.dir = _sl === 'ar' ? 'rtl' : 'ltr';
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Menlo', 'monospace'],
                    },
                    colors: {
                        brand: {
                            purple: '#8B5CF6',
                            cyan: '#06B6D4',
                            dark: '#0f172a',
                            darker: '#020617'
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s ease-in-out infinite',
                        'spin-slow': 'spin 8s linear infinite',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="relative overflow-x-hidden min-h-screen bg-slate-50 dark:bg-[#030712] text-slate-800 dark:text-slate-50 transition-colors duration-300">

    <!-- Animated mesh background -->
    <div class="mesh-bg" aria-hidden="true">
        <div class="mesh-orb orb-1"></div>
        <div class="mesh-orb orb-2"></div>
        <div class="mesh-orb orb-3"></div>
        <div class="mesh-grid"></div>
    </div>

    <!-- Confetti canvas -->
    <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-50" style="display:none"></canvas>

    <!-- App Shell -->
    <div class="relative z-10 flex flex-col items-center px-4 sm:px-6 md:px-8 py-8 sm:py-10 min-h-screen">

        <!-- Header -->
        <header class="w-full max-w-5xl mb-8 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="logo-icon">
                    <svg viewBox="0 0 36 36" fill="none" class="w-9 h-9">
                        <circle cx="18" cy="18" r="17" stroke="url(#lg1)" stroke-width="2"/>
                        <path d="M18 10v8l5 3" stroke="url(#lg1)" stroke-width="2.5" stroke-linecap="round"/>
                        <defs>
                            <linearGradient id="lg1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#06B6D4"/>
                                <stop offset="1" stop-color="#8B5CF6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="text-2xl sm:text-3xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-brand-cyan via-violet-500 to-brand-purple">
                    Chronofy
                </h1>
            </div>
            <div class="flex items-center gap-2 sm:gap-3">
                <p data-i18n="tagline" class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-widest hidden md:block">Time Managed</p>
                <!-- Language Selector -->
                <select id="lang-select" class="header-btn text-sm font-bold text-slate-700 dark:text-slate-200 cursor-pointer px-3">
                    <option value="ar">🌐 العربية</option>
                    <option value="en">🌐 English</option>
                    <option value="fr">🌐 Français</option>
                </select>
                <!-- Theme Toggle -->
                <button id="theme-toggle" class="header-btn w-10 h-10 flex items-center justify-center" aria-label="Toggle Dark Mode">
                    <svg id="icon-sun" class="w-5 h-5 hidden dark:block text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="icon-moon" class="w-5 h-5 block dark:hidden text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                </button>
            </div>
        </header>

        <!-- ======================== HOME VIEW ======================== -->
        <div id="view-home" class="w-full max-w-5xl flex flex-col items-center animate-fadein">

            <!-- Stats Bar -->
            <div id="stats-bar" class="w-full max-w-xl mb-8 grid grid-cols-3 gap-3 hidden">
                <div class="stat-card">
                    <span id="stat-total" class="stat-num">0</span>
                    <span data-i18n="stat-total" class="stat-label">Total</span>
                </div>
                <div class="stat-card">
                    <span id="stat-active" class="stat-num text-brand-cyan">0</span>
                    <span data-i18n="stat-active" class="stat-label">Active</span>
                </div>
                <div class="stat-card">
                    <span id="stat-done" class="stat-num text-pink-500">0</span>
                    <span data-i18n="stat-done" class="stat-label">Done</span>
                </div>
            </div>

            <!-- Creation Form -->
            <div class="form-card w-full max-w-xl mb-10">
                <div class="form-card-header">
                    <div class="flex items-center gap-3">
                        <div class="form-icon">⏱</div>
                        <h2 data-i18n="create-title" class="text-lg sm:text-xl font-extrabold text-slate-800 dark:text-white">Create Countdown</h2>
                    </div>
                </div>

                <form id="cd-form" class="p-6 sm:p-7 space-y-5">
                    <!-- Title Input -->
                    <div class="w-full">
                        <label data-i18n="event-title-label" for="cd-name" class="field-label">Event Title</label>
                        <input type="text" id="cd-name" data-i18n-placeholder="event-title-placeholder" placeholder="e.g., Vacation to Hawaii" 
                               class="field-input mt-1.5">
                    </div>

                    <!-- Color Accent -->
                    <div>
                        <label class="field-label mb-2 block" data-i18n="label-color">Color</label>
                        <div class="flex gap-2.5" id="color-picker">
                            <button type="button" class="color-swatch selected" data-color="cyan" style="background: linear-gradient(135deg,#06B6D4,#0284C7)"></button>
                            <button type="button" class="color-swatch" data-color="purple" style="background: linear-gradient(135deg,#8B5CF6,#6D28D9)"></button>
                            <button type="button" class="color-swatch" data-color="rose" style="background: linear-gradient(135deg,#F43F5E,#E11D48)"></button>
                            <button type="button" class="color-swatch" data-color="amber" style="background: linear-gradient(135deg,#F59E0B,#D97706)"></button>
                            <button type="button" class="color-swatch" data-color="emerald" style="background: linear-gradient(135deg,#10B981,#059669)"></button>
                            <button type="button" class="color-swatch" data-color="pink" style="background: linear-gradient(135deg,#EC4899,#DB2777)"></button>
                        </div>
                        <input type="hidden" id="cd-color" value="cyan">
                    </div>

                    <!-- Description -->
                    <div>
                        <label data-i18n="desc-label" for="cd-desc" class="field-label">Description (Optional)</label>
                        <textarea id="cd-desc" data-i18n-placeholder="desc-placeholder" rows="2" placeholder="Brief details about the event..."
                               class="field-input mt-1.5"></textarea>
                    </div>

                    <!-- Mode Toggle -->
                    <div class="mode-toggle">
                        <label class="mode-option">
                            <input type="radio" name="cd-mode" value="duration" class="peer sr-only" checked>
                            <span data-i18n="mode-duration" class="mode-label">⏳ Duration</span>
                        </label>
                        <label class="mode-option">
                            <input type="radio" name="cd-mode" value="datetime" class="peer sr-only">
                            <span data-i18n="mode-datetime" class="mode-label">📅 Date & Time</span>
                        </label>
                    </div>

                    <!-- Duration Inputs -->
                    <div id="duration-inputs" class="grid grid-cols-3 gap-3">
                        <div class="flex flex-col items-center gap-1.5">
                            <label data-i18n="label-days" class="field-label-sm">Days</label>
                            <input type="number" id="cd-days" min="0" placeholder="0" class="field-input text-center font-mono text-xl py-3">
                        </div>
                        <div class="flex flex-col items-center gap-1.5">
                            <label data-i18n="label-hours" class="field-label-sm">Hours</label>
                            <input type="number" id="cd-hours" min="0" placeholder="0" class="field-input text-center font-mono text-xl py-3">
                        </div>
                        <div class="flex flex-col items-center gap-1.5">
                            <label data-i18n="label-mins" class="field-label-sm">Mins</label>
                            <input type="number" id="cd-minutes" min="0" placeholder="0" class="field-input text-center font-mono text-xl py-3">
                        </div>
                    </div>

                    <!-- Datetime Input -->
                    <div id="datetime-inputs" class="hidden">
                        <label data-i18n="label-target" class="field-label mb-1.5 block">Select Target Date & Time</label>
                        <input type="datetime-local" id="cd-datetime" class="field-input">
                    </div>

                    <!-- Submit -->
                    <button type="submit" id="submit-btn" class="submit-btn">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        <span data-i18n="btn-start">Start Timer</span>
                    </button>
                </form>
            </div>

            <!-- Timers Header: Title + Search + Sort -->
            <div class="w-full max-w-5xl mb-5 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
                <h3 data-i18n="active-timers" class="text-sm font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Active Timers</h3>
                <div class="flex items-center gap-2 w-full sm:w-auto">
                    <!-- Search -->
                    <div class="relative flex-1 sm:flex-none">
                        <svg class="w-4 h-4 absolute top-1/2 -translate-y-1/2 start-3 text-slate-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg>
                        <input type="search" id="search-input" data-i18n-placeholder="search-placeholder" placeholder="Search timers..." class="search-input ps-9">
                    </div>
                    <!-- Sort -->
                    <select id="sort-select" class="header-btn text-xs font-bold text-slate-600 dark:text-slate-300 px-3">
                        <option value="newest" data-i18n-val="sort-newest">Newest</option>
                        <option value="soonest" data-i18n-val="sort-soonest">Soonest</option>
                        <option value="name" data-i18n-val="sort-name">A → Z</option>
                    </select>
                </div>
            </div>

            <!-- Countdown Cards Grid -->
            <div id="countdowns-container" class="w-full max-w-5xl grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 pb-24">
                <!-- Dynamically populated -->
            </div>
        </div>

        <!-- ======================== DETAIL VIEW ======================== -->
        <div id="view-detail" class="w-full max-w-2xl hidden flex-col animate-fadein pb-24">
            <!-- Back Button -->
            <button id="btn-back" class="back-btn mb-6 w-fit">
                <svg class="w-4 h-4 rtl:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                <span data-i18n="btn-dashboard">Dashboard</span>
            </button>

            <!-- Detail Card -->
            <div class="detail-card">
                <!-- Top colored band -->
                <div id="det-band" class="det-band"></div>

                <!-- Header -->
                <div class="p-6 sm:p-8 pb-0">
                    <div class="flex items-start gap-4">
                        <div class="flex-1 min-w-0">
                            <h2 id="det-title" class="text-2xl sm:text-3xl font-black text-slate-800 dark:text-white break-words leading-tight">Title</h2>
                            <p id="det-desc" class="text-slate-500 dark:text-slate-400 text-sm mt-1 font-medium hidden"></p>
                        </div>
                        <!-- Pin button -->
                        <button id="det-pin-btn" class="icon-btn mt-1" title="Pin timer">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Timer Display -->
                <div class="p-6 sm:p-8">
                    <!-- Ring + Numbers -->
                    <div class="flex flex-col items-center mb-8">
                        <div class="ring-container relative mb-6">
                            <svg class="ring-svg -rotate-90" viewBox="0 0 120 120">
                                <circle cx="60" cy="60" r="52" fill="none" stroke="currentColor" class="text-slate-200 dark:text-slate-800" stroke-width="8"/>
                                <circle id="det-ring" cx="60" cy="60" r="52" fill="none" stroke="url(#ringGrad)" stroke-width="8" stroke-linecap="round" stroke-dasharray="326.7" stroke-dashoffset="0" class="transition-all duration-1000"/>
                                <defs>
                                    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                        <stop offset="0%" stop-color="#06B6D4"/>
                                        <stop offset="100%" stop-color="#8B5CF6"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                            <div class="ring-center-text">
                                <span id="det-percent" class="text-2xl font-black text-slate-800 dark:text-white font-mono">100%</span>
                                <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wide">left</span>
                            </div>
                        </div>

                        <div id="det-display" class="grid grid-cols-4 gap-3 text-center w-full max-w-sm">
                            <div class="time-box-det">
                                <span id="det-d" class="text-3xl sm:text-4xl font-black font-mono text-slate-800 dark:text-white">00</span>
                                <span data-i18n="label-days" class="unit-label">Days</span>
                            </div>
                            <div class="time-box-det">
                                <span id="det-h" class="text-3xl sm:text-4xl font-black font-mono text-slate-800 dark:text-white">00</span>
                                <span data-i18n="label-hours" class="unit-label">Hours</span>
                            </div>
                            <div class="time-box-det">
                                <span id="det-m" class="text-3xl sm:text-4xl font-black font-mono text-slate-800 dark:text-white">00</span>
                                <span data-i18n="label-mins" class="unit-label">Mins</span>
                            </div>
                            <div class="time-box-det">
                                <span id="det-s" class="text-3xl sm:text-4xl font-black font-mono text-brand-cyan">00</span>
                                <span data-i18n="label-secs" class="unit-label">Secs</span>
                            </div>
                        </div>

                        <div id="det-timesup" class="hidden text-center py-6 w-full">
                            <div class="timesup-badge">
                                <span data-i18n="times-up" class="text-2xl font-black uppercase tracking-widest">Time's Up!</span>
                            </div>
                        </div>
                    </div>

                    <!-- Progress bar -->
                    <div class="w-full h-2 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden mb-8">
                        <div id="det-progress" class="h-full bg-gradient-to-r from-brand-cyan to-brand-purple rounded-full transition-all duration-1000"></div>
                    </div>

                    <!-- Date info -->
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="info-chip">
                            <span data-i18n="label-started" class="info-chip-label">Started</span>
                            <span id="det-start" class="info-chip-val"></span>
                        </div>
                        <div class="info-chip">
                            <span data-i18n="label-target-end" class="info-chip-label">Target End</span>
                            <span id="det-end" class="info-chip-val"></span>
                        </div>
                    </div>

                    <!-- Notes -->
                    <div>
                        <label class="field-label mb-2 flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                            <span data-i18n="label-notes">Notes</span>
                        </label>
                        <textarea id="det-notes" data-i18n-placeholder="notes-placeholder" rows="3" placeholder="Add notes..."
                                  class="field-input"></textarea>
                    </div>

                    <!-- Delete -->
                    <button id="det-delete-btn" class="delete-btn mt-6">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        <span data-i18n="btn-delete">Delete this Countdown</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="w-full max-w-5xl mt-auto pt-8 pb-2 text-center border-t border-slate-200/60 dark:border-slate-800/60">
            <p class="text-slate-400 dark:text-slate-600 text-xs font-medium">
                <span data-i18n="footer-designed">Designed for</span> <span class="font-bold text-slate-600 dark:text-slate-400 decoration-brand-cyan underline underline-offset-4">Belly</span>
            </p>
        </footer>
    </div>

    <style>
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:translateY(0);} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-24px)} }
        @keyframes tickBounce { 0%{transform:scale(1)} 50%{transform:scale(1.12)} 100%{transform:scale(1)} }
        .animate-fadein { animation: fadeIn 0.35s ease both; }
        .tick-anim { animation: tickBounce 0.18s ease; }
    </style>
    <script src="script.js"></script>
</body>
</html>
