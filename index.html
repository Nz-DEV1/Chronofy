<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chronofy | Modern Countdown App</title>
    <!-- Prevent FOUC for dark mode -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Menlo', 'monospace'],
                    },
                    colors: {
                        brand: {
                            purple: '#8B5CF6',
                            cyan: '#06B6D4',
                            dark: '#0f172a',
                            darker: '#020617'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="flex flex-col items-center pt-safe pb-safe px-4 sm:px-6 md:px-8 py-8 sm:py-12 relative overflow-x-hidden min-h-screen bg-slate-50 dark:bg-brand-darker text-slate-800 dark:text-slate-50 transition-colors duration-300">

    <!-- Decorative background blobs -->
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-brand-purple rounded-full mix-blend-screen filter blur-[120px] opacity-30 dark:opacity-20 pointer-events-none transition-opacity"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[28rem] h-[28rem] bg-brand-cyan rounded-full mix-blend-screen filter blur-[150px] opacity-30 dark:opacity-20 pointer-events-none transition-opacity"></div>

    <!-- Header -->
    <header class="w-full max-w-4xl mb-8 sm:mb-10 flex justify-between items-center relative z-10">
        <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-brand-cyan to-brand-purple">
            Chronofy
        </h1>
        <div class="flex items-center gap-4">
            <p class="text-slate-500 dark:text-slate-400 text-sm font-semibold uppercase tracking-widest hidden sm:block">Time Managed</p>
            <button id="theme-toggle" class="p-2 sm:p-2.5 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:text-brand-cyan dark:hover:text-brand-cyan transition-colors" aria-label="Toggle Dark Mode">
                <!-- Sun icon (shown in dark mode) -->
                <svg id="icon-sun" class="w-6 h-6 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <!-- Moon icon (shown in light mode) -->
                <svg id="icon-moon" class="w-6 h-6 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Home View -->
    <div id="view-home" class="w-full flex-col items-center flex relative z-10 pb-20 w-full animate-[fadeIn_0.3s_ease]">
        <!-- App Creation Form -->
        <main class="w-full max-w-xl glass-panel rounded-3xl p-6 sm:p-8 mb-12">
            <h2 class="text-xl sm:text-2xl font-bold mb-6 text-slate-800 dark:text-white flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-brand-cyan" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Create Countdown
            </h2>

            <form id="cd-form" class="space-y-6">
                <!-- Event Name & Desc -->
                <div>
                    <label for="cd-name" class="block text-sm font-semibold text-slate-500 dark:text-slate-300 mb-2 mt-2">Event Title</label>
                    <input type="text" id="cd-name" placeholder="e.g., Vacation to Hawaii" 
                           class="w-full bg-white dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3.5 text-slate-800 dark:text-white placeholder-slate-400 focus:outline-none focus:border-brand-cyan focus:ring-1 focus:ring-brand-cyan transition-all shadow-inner">
                           
                    <label for="cd-desc" class="block text-sm font-semibold text-slate-500 dark:text-slate-300 mb-2 mt-4">Description (Optional)</label>
                    <textarea id="cd-desc" rows="2" placeholder="Brief details about the event..."
                           class="w-full bg-white dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-800 dark:text-white placeholder-slate-400 focus:outline-none focus:border-brand-cyan focus:ring-1 focus:ring-brand-cyan transition-all shadow-inner"></textarea>
                </div>

                <!-- Mode Selection -->
                <div class="p-1 bg-slate-100 dark:bg-slate-900/60 rounded-xl flex border border-slate-200 dark:border-slate-800">
                    <label class="flex-1 text-center cursor-pointer relative">
                        <input type="radio" name="cd-mode" value="duration" class="peer sr-only" checked>
                        <div class="py-2.5 rounded-lg text-sm font-bold text-slate-500 dark:text-slate-400 peer-checked:bg-white dark:peer-checked:bg-slate-800 peer-checked:text-brand-purple dark:peer-checked:text-white transition-all peer-checked:shadow shadow-black/5 dark:shadow-black/20">
                            Duration
                        </div>
                    </label>
                    <label class="flex-1 text-center cursor-pointer relative">
                        <input type="radio" name="cd-mode" value="datetime" class="peer sr-only">
                        <div class="py-2.5 rounded-lg text-sm font-bold text-slate-500 dark:text-slate-400 peer-checked:bg-white dark:peer-checked:bg-slate-800 peer-checked:text-brand-purple dark:peer-checked:text-white transition-all peer-checked:shadow shadow-black/5 dark:shadow-black/20">
                            Date & Time
                        </div>
                    </label>
                </div>

                <!-- Duration Inputs -->
                <div id="duration-inputs" class="grid grid-cols-3 gap-3 sm:gap-4 animate-[fadeIn_0.3s_ease]">
                    <div class="flex flex-col items-center">
                        <label class="text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Days</label>
                        <input type="number" id="cd-days" min="0" placeholder="0" 
                               class="w-full bg-white dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700 rounded-xl px-2 py-3 text-center text-slate-900 dark:text-white font-mono text-lg focus:outline-none focus:border-brand-cyan transition-colors shadow-inner">
                    </div>
                    <div class="flex flex-col items-center">
                        <label class="text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Hours</label>
                        <input type="number" id="cd-hours" min="0" placeholder="0" 
                               class="w-full bg-white dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700 rounded-xl px-2 py-3 text-center text-slate-900 dark:text-white font-mono text-lg focus:outline-none focus:border-brand-cyan transition-colors shadow-inner">
                    </div>
                    <div class="flex flex-col items-center">
                        <label class="text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Mins</label>
                        <input type="number" id="cd-minutes" min="0" placeholder="0" 
                               class="w-full bg-white dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700 rounded-xl px-2 py-3 text-center text-slate-900 dark:text-white font-mono text-lg focus:outline-none focus:border-brand-cyan transition-colors shadow-inner">
                    </div>
                </div>

                <!-- Datetime Input -->
                <div id="datetime-inputs" class="hidden animate-[fadeIn_0.3s_ease]">
                    <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">Select Target</label>
                    <input type="datetime-local" id="cd-datetime" 
                           class="w-full bg-white dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3.5 text-slate-800 dark:text-white focus:outline-none focus:border-brand-cyan focus:ring-1 focus:ring-brand-cyan transition-all shadow-inner">
                </div>

                <!-- Submit -->
                <button type="submit" 
                        class="w-full mt-2 bg-gradient-to-r from-brand-cyan to-brand-purple hover:scale-[1.02] active:scale-[0.98] text-white font-bold py-3.5 px-6 rounded-xl shadow-[0_4_20px_rgba(6,182,212,0.25)] dark:shadow-[0_0_20px_rgba(6,182,212,0.3)] hover:shadow-lg transition-all duration-200 uppercase tracking-wide text-sm">
                    Start Timer
                </button>
            </form>
        </main>

        <!-- Active Countdowns -->
        <div class="w-full max-w-4xl w-full">
            <h3 class="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-6 px-2">Active Timers</h3>
            <div id="countdowns-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>

    <!-- Detail View -->
    <div id="view-detail" class="w-full max-w-2xl hidden flex-col relative z-20 pb-20 animate-[fadeIn_0.3s_ease]">
        <button id="btn-back" class="flex items-center gap-2 text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white mb-6 transition font-bold w-fit bg-white/50 dark:bg-slate-800/50 py-2 px-4 rounded-xl border border-slate-200 dark:border-slate-700 backdrop-blur-md">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            Dashboard
        </button>
        
        <div class="glass-panel rounded-3xl p-6 sm:p-10 flex flex-col w-full shadow-2xl">
            <h2 id="det-title" class="text-3xl sm:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-brand-cyan to-brand-purple break-words mb-2 leading-tight">Title</h2>
            <p id="det-desc" class="text-slate-600 dark:text-slate-300 font-medium mb-8 p-4 bg-slate-100 dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-700/50"></p>

            <!-- Large Timer Block -->
            <div class="bg-indigo-50/50 dark:bg-slate-900/60 rounded-2xl p-6 sm:p-8 mb-8 border border-indigo-100 dark:border-slate-700/50 shadow-inner">
                 <div class="flex flex-col items-center">
                    <div id="det-display" class="grid grid-cols-4 gap-2 sm:gap-4 text-center w-full max-w-md mb-8">
                        <div class="time-box rounded-2xl p-3 sm:p-4 flex flex-col justify-center shadow-md">
                            <span id="det-d" class="text-3xl sm:text-5xl font-black font-mono text-slate-800 dark:text-white">00</span>
                            <span class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-slate-500 mt-2">Days</span>
                        </div>
                        <div class="time-box rounded-2xl p-3 sm:p-4 flex flex-col justify-center shadow-md">
                            <span id="det-h" class="text-3xl sm:text-5xl font-black font-mono text-slate-800 dark:text-white">00</span>
                            <span class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-slate-500 mt-2">Hours</span>
                        </div>
                        <div class="time-box rounded-2xl p-3 sm:p-4 flex flex-col justify-center shadow-md">
                            <span id="det-m" class="text-3xl sm:text-5xl font-black font-mono text-slate-800 dark:text-white">00</span>
                            <span class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-slate-500 mt-2">Mins</span>
                        </div>
                        <div class="time-box rounded-2xl p-3 sm:p-4 flex flex-col justify-center shadow-md relative overflow-hidden">
                            <span id="det-s" class="text-3xl sm:text-5xl font-black font-mono text-brand-cyan drop-shadow-md">00</span>
                            <span class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-slate-500 mt-2">Secs</span>
                        </div>
                    </div>
                    
                    <div id="det-timesup" class="hidden text-center py-6 w-full animate-pulse">
                        <span class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-orange-400 uppercase tracking-widest">Time's Up!</span>
                    </div>

                    <!-- Detailed Progress bar -->
                    <div class="w-full h-3 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden shadow-inner">
                        <div id="det-progress" class="h-full bg-gradient-to-r from-brand-cyan to-brand-purple transition-all duration-1000 ease-linear" style="width:0%"></div>
                    </div>
                </div>
            </div>

            <div class="grid sm:grid-cols-2 gap-4 mb-8">
                <div class="p-5 rounded-2xl bg-white/60 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 shadow-sm">
                    <span class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1">Started</span>
                    <span id="det-start" class="font-bold text-slate-800 dark:text-slate-100"></span>
                </div>
                <div class="p-5 rounded-2xl bg-white/60 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 shadow-sm">
                    <span class="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1">Target End</span>
                    <span id="det-end" class="font-bold text-slate-800 dark:text-slate-100"></span>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-500 dark:text-slate-400 mb-3 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                    Personal Notes
                </label>
                <textarea id="det-notes" rows="4" placeholder="Add some notes about this event here (autosaved)..." 
                          class="w-full bg-white dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-800 dark:text-white focus:outline-none focus:border-brand-purple focus:ring-1 focus:ring-brand-purple transition-all shadow-inner"></textarea>
            </div>
            
            <button id="det-delete-btn" class="mt-8 w-full py-4 rounded-xl border border-red-200 dark:border-red-900/50 text-red-500 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 font-bold transition-colors flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                Delete this Countdown
            </button>
        </div>
    </div>
    
    <!-- Final Footer -->
    <footer class="w-full max-w-4xl mt-auto py-8 text-center relative z-10 border-t border-slate-200 dark:border-slate-800/50">
        <p class="text-slate-400 dark:text-slate-500 text-sm font-medium tracking-wide">
            Designed  for <span class="text-slate-600 dark:text-slate-300 font-bold underline decoration-brand-cyan underline-offset-4">Belly</span>
        </p>
    </footer>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <!-- Logic -->
    <script src="script.js"></script>
</body>
</html>
